name: Build

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Build for Linux
        run: go build -o zyrln-linux-amd64 ./platforms/desktop/
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-linux-amd64
          path: zyrln-linux-amd64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.0'
      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o zyrln-windows-amd64.exe ./platforms/desktop/
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: zyrln-windows-amd64
          path: zyrln-windows-amd64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            zyrln-linux-amd64
            zyrln-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
