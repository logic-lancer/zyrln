name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22' # Adjusted to a stable existing version
          cache: true
      - name: Build for Linux
        run: go build -o zyrln-linux-amd64 ./platforms/desktop/
      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: linux-bin
          path: zyrln-linux-amd64

  build-windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          cache: true
      - name: Build for Windows
        run: GOOS=windows GOARCH=amd64 go build -o zyrln-windows-amd64.exe ./platforms/desktop/
      - name: Upload Windows binary
        uses: actions/upload-artifact@v4
        with:
          name: windows-bin
          path: zyrln-windows-amd64.exe

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./dist
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          # Use a pipe | for multi-line strings to avoid sequence errors
          files: |
            ./dist/zyrln-linux-amd64
            ./dist/zyrln-windows-amd64.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}